<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="left">
            <h2>Log In</h2>
            <p id="par">Log in to your account to upload or <br> download pictures, videos or music</p>
            <input type="text" placeholder="Enter your email address" required>
            <div class="fpwd">
                <p>Forgot password?</p>
                <button>
                    <p>Next</p>
                    <img src="images/arrow-right.svg" alt="arrow" width="15px">
                </button>
            </div>
            <hr>
            <p id="or">Or Log in with</p>
            <div class="socials">
                <button>
                    <img src="images/facebook.svg" alt="fb" width="15">
                    <p>Facebook</p>
                </button>
                <button>
                    <img src="images/google.svg" alt="google" width="15">
                    <p>Google</p>
                </button>
            </div>
            <p>Don't have ab account yet?<span><a>Sign up</a></span></p>
        </div>
        <div class="right">
            <img src="images/ocean.jpg" alt="ocean" width="50">
        </div>
    </div>
</body>

</html>
