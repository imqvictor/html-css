<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="card">
        <header>
            <h1>Today's TODOS</h1>
            <p>6 tasks</p>
        </header>
        <div class="disp">
            <input type="text" placeholder="Add New">
            <button>Add new Todo</button>
        </div>
        <div class="todo-list">
            <div class="todo">
                <p class="completed">Visit Grandmother</p>
                <div class="img-wrapper">
                    <img style="display: none;" width="10" src="images/tick.svg" alt="tick">
                </div>
            </div>
            <div class="todo">
                <p>Learn HTML</p>
                <div class="img-wrapper">
                    <img width="10" src="images/tick.svg" alt="tick">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
