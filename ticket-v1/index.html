<!DOCTYPE html>

<body>

            <p>Onsite access</p>
            <button type="button">Buy Ticket</button>

        <div class="bottom">
            <div>
                <img src="assets/check-mark.svg" alt="mark" width="15px">

            </div>
            <div>
                <img src="assets/check-mark.svg" alt="mark" width="15px">

            </div>
            <div>
                <img src="assets/check-mark.svg" alt="mark" width="15px">
                <p>Lunch and Networking</p>
            </div>
            <div>
                <img src="assets/check-mark.svg" alt="mark" width="15">

            </div>
            <div>
                <img src="assets/check-mark.svg" alt="mark" width="15px">

            </div>
